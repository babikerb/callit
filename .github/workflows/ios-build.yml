# Manual iOS build: Actions tab -> "iOS Build" -> Run workflow -> pick a profile.
name: iOS Build (local on macOS runner)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - development
          - production

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Expo / React Native requires a recent Xcode (pod install fails otherwise).
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS (.ipa) locally on the macOS runner
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COCOAPODS_DISABLE_STATS: true
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/Callit-${{ github.event.inputs.profile }}.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Callit-${{ github.event.inputs.profile }}-ipa
          path: ${{ github.workspace }}/Callit-*.ipa
          if-no-files-found: error
          retention-days: 14
